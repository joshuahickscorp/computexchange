x-logging: &logs
  driver: json-file
  options: {max-size: "10m", max-file: "5"}

x-control-env: &control-env
  CX_ENV: production
  DATABASE_URL: postgres://cx:${POSTGRES_PASSWORD}@postgres:5432/cx?sslmode=disable
  LISTEN_ADDR: ":8080"
  CX_PUBLIC_CONTROL_ORIGIN: ${CX_PUBLIC_CONTROL_ORIGIN:?required}
  STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:?required}
  STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:?required}
  CX_CONNECT_WEBHOOK_SECRET: ${CX_CONNECT_WEBHOOK_SECRET:?required}
  CX_CONNECT_RETURN_URL: ${CX_CONNECT_RETURN_URL:?required}
  CX_CONNECT_REFRESH_URL: ${CX_CONNECT_REFRESH_URL:?required}
  CX_TOKEN_KEY: ${CX_TOKEN_KEY:?required}
  CX_VERIFICATION_SAMPLE_SECRET: ${CX_VERIFICATION_SAMPLE_SECRET:?required}
  CX_ECON_SCHEDULE_VERSION: ${CX_ECON_SCHEDULE_VERSION:?required}
  CX_PROCESSOR_PERCENT_BPS: ${CX_PROCESSOR_PERCENT_BPS:?required}
  CX_PROCESSOR_FIXED_USD: ${CX_PROCESSOR_FIXED_USD:?required}
  CX_CONTROL_PLANE_PER_TASK_USD: ${CX_CONTROL_PLANE_PER_TASK_USD:?required}
  CX_TARGET_MARGIN_BPS: ${CX_TARGET_MARGIN_BPS:?required}
  GOMEMLIMIT: 384MiB
  S3_ENDPOINT: http://minio:9000
  S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:?required}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_BUCKET: ${S3_BUCKET:-cx-jobs}
  S3_ACCESS_KEY: ${MINIO_ROOT_USER}
  S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: cx
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: cx
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: [CMD-SHELL, pg_isready -U cx -d cx]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    logging: *logs

  minio:
    image: minio/minio
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?required}
    ports: ["127.0.0.1:9000:9000"]
    volumes: [miniodata:/data]
    healthcheck:
      test: [CMD-SHELL, curl -fsS http://localhost:9000/minio/health/live]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    logging: *logs

  createbuckets:
    image: minio/mc
    depends_on:
      minio: {condition: service_healthy}
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >-
      /bin/sh -c 'mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" &&
      mc mb --ignore-existing local/cx-jobs && mc anonymous set none local/cx-jobs'
    restart: "no"

  control:
    build:
      context: .
      dockerfile: Dockerfile.control
      args:
        CX_BUILD_VERSION: ${CX_BUILD_VERSION:-dev}
        CX_BUILD_COMMIT: ${CX_BUILD_COMMIT:-unknown}
        CX_BUILD_DATE: ${CX_BUILD_DATE:-unknown}
    image: computexchange/control:${CX_BUILD_COMMIT:-dev}
    depends_on:
      postgres: {condition: service_healthy}
      minio: {condition: service_healthy}
      createbuckets: {condition: service_completed_successfully}
    env_file: [.env]
    environment: *control-env
    expose: ["8080"]
    healthcheck:
      test: [CMD, /cx, healthcheck]
      interval: 10s
      timeout: 4s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    logging: *logs

  caddy:
    image: caddy:2
    depends_on:
      control: {condition: service_healthy}
      minio: {condition: service_healthy}
    environment:
      ACME_EMAIL: ${ACME_EMAIL:?required}
      SITE_HOST: ${SITE_HOST:-computexchange.net}
      STORAGE_HOST: ${STORAGE_HOST:-storage.computexchange.net}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports: ["80:80", "443:443", "443:443/udp"]
    restart: unless-stopped
    logging: *logs

volumes:
  pgdata:
  miniodata:
  caddy_data:
  caddy_config:
