services:
  postgres:
    image: postgres:17@sha256:a426e44bac0b759c95894d68e1a0ac03ecc20b619f498a91aae373bf06d8508d
    environment: {POSTGRES_USER: cx, POSTGRES_PASSWORD: cx, POSTGRES_DB: cx}
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: [CMD-SHELL, pg_isready -U cx -d cx]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    command: server /data
    environment: {MINIO_ROOT_USER: minioadmin, MINIO_ROOT_PASSWORD: minioadmin}
    ports: ["9000:9000"]
    volumes: [miniodata:/data]
    healthcheck:
      test: [CMD-SHELL, curl -fsS http://localhost:9000/minio/health/live]
      interval: 5s
      timeout: 3s
      retries: 10

  createbuckets:
    image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    depends_on:
      minio: {condition: service_healthy}
    entrypoint: >-
      /bin/sh -c 'mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/cx-jobs && mc anonymous set none local/cx-jobs'
    restart: "no"

  control:
    build: {context: ., dockerfile: Dockerfile.control}
    depends_on:
      postgres: {condition: service_healthy}
      minio: {condition: service_healthy}
      createbuckets: {condition: service_completed_successfully}
    environment:
      DATABASE_URL: postgres://cx:cx@postgres:5432/cx?sslmode=disable
      LISTEN_ADDR: ":8080"
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      S3_BUCKET: cx-jobs
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
    ports: ["8080:8080"]
    restart: unless-stopped
    healthcheck:
      test: [CMD, /cx, healthcheck]
      interval: 10s
      timeout: 4s
      retries: 5
      start_period: 15s

volumes:
  pgdata:
  miniodata:
