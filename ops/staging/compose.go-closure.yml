name: cx-go-closure

x-logging: &bounded-logs
  driver: json-file
  options:
    max-size: "10m"
    max-file: "10"

x-control-environment: &control-environment
  CX_ENV: production
  CX_CANARY_MODE: "true"
  CX_TRUSTED_PROXY_CIDRS: ${CX_TRUSTED_PROXY_CIDRS:-172.16.0.0/12}
  CX_PUBLIC_CONTROL_ORIGIN: https://${STAGING_TLS_HOSTNAME:?declared in ops/go-closure-inputs.json and required in .env.go-closure}
  SITE_HOST: ${STAGING_TLS_HOSTNAME:?declared in ops/go-closure-inputs.json and required in .env.go-closure}
  DATABASE_URL: postgres://cx:${POSTGRES_PASSWORD:?required in .env.go-closure}@postgres:5432/cx?sslmode=disable
  LISTEN_ADDR: ":8080"
  DB_MAX_CONNS: ${DB_MAX_CONNS:-20}
  STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:?test-mode key declared in ops/go-closure-inputs.json}
  STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:?declared in ops/go-closure-inputs.json}
  CX_CONNECT_WEBHOOK_SECRET: ${CX_CONNECT_WEBHOOK_SECRET:?declared in ops/go-closure-inputs.json}
  CX_CONNECT_CLIENT_ID: ${CX_CONNECT_CLIENT_ID:?test-mode client ID declared in ops/go-closure-inputs.json}
  CX_CONNECT_RETURN_URL: https://${STAGING_TLS_HOSTNAME:?required}/admin?connect=return
  CX_CONNECT_REFRESH_URL: https://${STAGING_TLS_HOSTNAME:?required}/admin?connect=refresh
  CX_TOKEN_KEY: ${CX_TOKEN_KEY:?at least 32 unpredictable bytes; required in .env.go-closure}
  CX_VERIFICATION_SAMPLE_SECRET: ${CX_VERIFICATION_SAMPLE_SECRET:?at least 32 unpredictable bytes; required in .env.go-closure}
  CX_ECON_SCHEDULE_VERSION: "2026-07-19"
  CX_PROCESSOR_PERCENT_BPS: "290"
  CX_PROCESSOR_FIXED_USD: "0.30"
  CX_CONTROL_PLANE_PER_TASK_USD: "0.0001"
  CX_TARGET_MARGIN_BPS: "1000"
  CX_CANARY_APPROVED_BUYER_EMAILS: ${CX_CANARY_APPROVED_BUYER_EMAILS:?required in .env.go-closure}
  CX_CANARY_APPROVED_WORKER_IDS: ${CX_CANARY_APPROVED_WORKER_IDS:?required in .env.go-closure}
  CX_CANARY_APPROVED_AGENT_VERSIONS: ${CX_CANARY_APPROVED_AGENT_VERSIONS:?required in .env.go-closure}
  CX_CANARY_APPROVED_BUILD_HASHES: ${CX_CANARY_APPROVED_BUILD_HASHES:?required in .env.go-closure}
  CX_CANARY_MAX_ACTIVE_BUYERS: "2"
  CX_CANARY_MAX_ACTIVE_WORKERS: "2"
  CX_CANARY_MAX_QUEUED_JOBS: "20"
  CX_CANARY_MAX_TASKS_PER_JOB: "64"
  CX_CANARY_MAX_ARTIFACT_BYTES: "33554432"
  CX_CANARY_MAX_INPUT_BYTES: "33554432"
  CX_CANARY_MAX_OUTPUT_TOKENS: "256"
  CX_CANARY_MAX_JOB_DURATION_SECS: "600"
  CX_CANARY_MAX_RETRIES: "3"
  CX_CANARY_MAX_DAILY_JOBS: "100"
  CX_CANARY_MAX_SHADOW_VALUE_USD: "10"
  CX_CANARY_MAX_HELD_SHADOW_PAYOUT_USD: "10"
  GOMEMLIMIT: 384MiB
  S3_ENDPOINT: http://minio:9000
  S3_PUBLIC_ENDPOINT: https://${STAGING_STORAGE_TLS_HOSTNAME:?required in .env.go-closure}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_BUCKET: ${S3_BUCKET:-cx-jobs}
  S3_ACCESS_KEY: ${MINIO_ROOT_USER:?required in .env.go-closure}
  S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?required in .env.go-closure}
  CX_BACKUP_STATUS_FILE: /run/cx-health/last-successful-offsite-backup.unixtime

services:
  postgres:
    image: postgres:17@sha256:a426e44bac0b759c95894d68e1a0ac03ecc20b619f498a91aae373bf06d8508d
    environment:
      POSTGRES_USER: cx
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required in .env.go-closure}
      POSTGRES_DB: cx
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [CMD-SHELL, pg_isready -U cx -d cx]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.5
    pids_limit: 256
    shm_size: 128m
    stop_grace_period: 60s
    logging: *bounded-logs

  minio:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?required in .env.go-closure}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?required in .env.go-closure}
    ports:
      - "127.0.0.1:9000:9000"
    volumes:
      - miniodata:/data
    healthcheck:
      test: [CMD-SHELL, "curl -fsS http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.5
    pids_limit: 256
    stop_grace_period: 60s
    logging: *bounded-logs

  createbuckets:
    image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?required in .env.go-closure}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?required in .env.go-closure}
    entrypoint: >-
      /bin/sh -c 'mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" &&
      mc mb --ignore-existing local/cx-jobs && mc anonymous set none local/cx-jobs'
    restart: "no"
    mem_limit: 128m
    cpus: 0.25
    pids_limit: 64

  control:
    image: ${CX_ACTIVE_CONTROL_IMAGE:?must be an immutable registry/repository@sha256 digest}
    pull_policy: always
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    env_file:
      - ../../.env.go-closure
    environment: *control-environment
    expose:
      - "8080"
    volumes:
      - ../../.artifacts/go-closure-health:/run/cx-health:ro
    healthcheck:
      test: [CMD, /cx, healthcheck]
      interval: 10s
      timeout: 4s
      retries: 12
      start_period: 20s
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 128
    stop_grace_period: 60s
    logging: *bounded-logs

  caddy:
    image: caddy:2@sha256:844f60b64e4724a5aa8245e019dace0d3f199f7433ce6c57676cb30a920dbad9
    depends_on:
      control:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      ACME_EMAIL: ${ACME_EMAIL:?required in .env.go-closure}
      SITE_HOST: ${STAGING_TLS_HOSTNAME:?declared in ops/go-closure-inputs.json}
      STORAGE_HOST: ${STAGING_STORAGE_TLS_HOSTNAME:?required in .env.go-closure}
    volumes:
      - ../../Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "${STAGING_BIND_ADDRESS:?specific non-wildcard IPv4 required}:80:80"
      - "${STAGING_BIND_ADDRESS:?specific non-wildcard IPv4 required}:443:443"
      - "${STAGING_BIND_ADDRESS:?specific non-wildcard IPv4 required}:443:443/udp"
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 128
    stop_grace_period: 30s
    logging: *bounded-logs

  prometheus:
    image: ${CX_PROMETHEUS_IMAGE:?must be an immutable registry/repository@sha256 digest}
    pull_policy: always
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    volumes:
      - ../../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      control:
        condition: service_healthy
      alertmanager:
        condition: service_healthy
    healthcheck:
      test: [CMD, wget, --spider, --quiet, "http://localhost:9090/-/ready"]
      interval: 10s
      timeout: 4s
      retries: 12
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging: *bounded-logs

  alertmanager:
    image: ${CX_ALERTMANAGER_IMAGE:?must be an immutable registry/repository@sha256 digest}
    pull_policy: always
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ../../monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    secrets:
      - source: alert_receiver_url
        target: cx_alert_receiver_url
        mode: 0400
    ports:
      - "127.0.0.1:9093:9093"
    healthcheck:
      test: [CMD, wget, --spider, --quiet, "http://localhost:9093/-/ready"]
      interval: 10s
      timeout: 4s
      retries: 12
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging: *bounded-logs

  grafana:
    image: ${CX_GRAFANA_IMAGE:?must be an immutable registry/repository@sha256 digest}
    pull_policy: always
    environment:
      GF_SECURITY_ADMIN_USER: cx-staging-admin
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?required in .env.go-closure}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ../../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging: *bounded-logs

  node-exporter:
    image: ${CX_NODE_EXPORTER_IMAGE:?must be an immutable registry/repository@sha256 digest}
    pull_policy: always
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave
    expose:
      - "9100"
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging: *bounded-logs

secrets:
  alert_receiver_url:
    file: ../../.secrets/go-closure/cx_alert_receiver_url

volumes:
  pgdata:
  miniodata:
  caddy_data:
  caddy_config:
  prometheus_data:
  alertmanager_data:
  grafana_data:
