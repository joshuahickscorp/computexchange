<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>computexchange control room</title>
<style>
:root {
  color-scheme: dark;
  --ink: #090806;
  --panel: #12100c;
  --line: #403621;
  --gold: #d8b86a;
  --muted: #9c927d;
  --bad: #d27262;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--ink);
  color: #f4eedf;
  font: 14px ui-monospace, SFMono-Regular, Menlo, monospace;
}
header, main { max-width: 1180px; margin: auto; padding: 22px; }
header {
  display: flex;
  align-items: center;
  gap: 18px;
  border-bottom: 1px solid var(--line);
}
h1 {
  margin: 0;
  color: var(--gold);
  font: 500 23px Georgia, serif;
  letter-spacing: .08em;
}
small { color: var(--muted); }
input, select, textarea, button {
  padding: 9px;
  border: 1px solid var(--line);
  background: #17140f;
  color: #f4eedf;
  font: inherit;
}
button { color: var(--gold); cursor: pointer; }
button:hover { border-color: var(--gold); }
#key { width: min(360px, 42vw); margin-left: auto; }
nav { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.active { background: var(--gold); color: var(--ink); }
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 12px;
}
.card {
  overflow: auto;
  padding: 14px;
  border: 1px solid var(--line);
  background: var(--panel);
}
.card h2 { margin: 0 0 9px; color: var(--gold); font-size: 13px; }
pre { margin: 0; color: #d9d2c1; white-space: pre-wrap; overflow-wrap: anywhere; }
.action {
  display: grid;
  grid-template-columns: 2fr 1fr auto;
  gap: 8px;
  margin-top: 18px;
}
.action textarea { grid-column: 1 / -1; min-height: 76px; }
#status { min-height: 20px; margin: 12px 0; color: var(--muted); }
.error { color: var(--bad) !important; }
@media (max-width: 650px) {
  header { align-items: flex-start; flex-wrap: wrap; }
  #key { width: 100%; margin: 0; }
  .action { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<header>
  <h1>cx / control room</h1>
  <small>authenticated operator API</small>
  <input id="key" type="password" autocomplete="off" placeholder="admin API key">
</header>
<main>
<nav id="tabs"></nav>
<div id="status">Enter a revocable admin key, then refresh.</div>
<div id="data" class="grid"></div>
<form id="action" class="action">
  <input id="path" required placeholder="/admin/workers/{id}/suspend">
  <select id="method"><option>POST</option><option>DELETE</option></select>
  <button>execute</button>
  <textarea id="body" placeholder='{"reason":"operator action","request_id":"unique-id"}'></textarea>
</form>
</main>
<script>
const views = {
  workers: '/admin/workers',
  jobs: '/admin/jobs',
  payouts: '/admin/payouts',
  fraud: '/admin/fraud',
  drift: '/admin/drift',
  actions: '/admin/actions'
};
const key = document.querySelector('#key');
const status = document.querySelector('#status');
const data = document.querySelector('#data');
const tabs = document.querySelector('#tabs');
key.value = sessionStorage.getItem('cx-admin-key') || '';

for (const [name, path] of Object.entries(views)) {
  const button = document.createElement('button');
  button.textContent = name;
  button.onclick = () => load(name, path, button);
  tabs.append(button);
}

async function request(path, options = {}) {
  sessionStorage.setItem('cx-admin-key', key.value);
  const headers = { Authorization: 'Bearer ' + key.value };
  if (options.body) headers['Content-Type'] = 'application/json';
  const response = await fetch(path, { ...options, headers });
  const text = await response.text();
  let value;
  try { value = JSON.parse(text); } catch { value = text; }
  if (!response.ok) {
    throw new Error(typeof value === 'string' ? value : JSON.stringify(value));
  }
  return value;
}

function card(name, row, index) {
  const section = document.createElement('section');
  section.className = 'card';
  section.innerHTML = '<h2></h2><pre></pre>';
  section.querySelector('h2').textContent = `${name} / ${index + 1}`;
  section.querySelector('pre').textContent = JSON.stringify(row, null, 2);
  return section;
}

async function load(name, path, button) {
  status.className = '';
  status.textContent = `loading ${name}...`;
  for (const tab of tabs.children) tab.classList.remove('active');
  button.classList.add('active');
  try {
    const value = await request(path);
    const rows = Array.isArray(value) ? value : [value];
    data.replaceChildren(...rows.map((row, index) => card(name, row, index)));
    status.textContent = `${rows.length} record(s)`;
  } catch (error) {
    status.className = 'error';
    status.textContent = error.message;
    data.replaceChildren();
  }
}

document.querySelector('#action').onsubmit = async event => {
  event.preventDefault();
  if (!confirm('Execute this audited operator action?')) return;
  try {
    const raw = document.querySelector('#body').value;
    const value = await request(document.querySelector('#path').value, {
      method: document.querySelector('#method').value,
      body: raw || '{}'
    });
    status.className = '';
    status.textContent = JSON.stringify(value);
  } catch (error) {
    status.className = 'error';
    status.textContent = error.message;
  }
};
key.onchange = () => sessionStorage.setItem('cx-admin-key', key.value);
tabs.firstChild.click();
</script>
</body>
</html>
