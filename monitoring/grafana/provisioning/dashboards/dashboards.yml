# Auto-load any dashboard JSON dropped in /var/lib/grafana/dashboards.
apiVersion: 1

providers:
  - name: computexchange
    orgId: 1
    folder: Computexchange
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
