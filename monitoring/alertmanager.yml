global:
  resolve_timeout: 5m

route:
  receiver: real-canary-receiver
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - receiver: real-canary-receiver
      matchers: ['severity="page"']
      repeat_interval: 30m
    - receiver: real-canary-receiver
      matchers: ['severity="ticket"']
      repeat_interval: 12h

receivers:
  - name: real-canary-receiver
    webhook_configs:
      - url_file: /run/secrets/cx_alert_receiver_url
        send_resolved: true
        max_alerts: 20
        timeout: 10s
