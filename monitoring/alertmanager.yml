# Computexchange · Alertmanager routing.
#
# Two real delivery paths, both gated on env the owner supplies (see
# .env.example): Slack for everything, PagerDuty for `severity: page`. The
# `heartbeat` severity (DeadMansSwitch) is routed to a watchdog webhook whose
# job is to alert when it STOPS receiving.
#
# BLACKHOLE: this file references env via the ${...} expansion that the
# alertmanager container's entrypoint must resolve (we run it with
# `--config.file` pointed at an envsubst'd copy; see docker-compose.prod.yml).
# If SLACK_WEBHOOK_URL / PAGERDUTY_ROUTING_KEY are unset, Alertmanager logs a
# delivery error loudly on the first alert — it does NOT silently drop. Do not
# treat unset creds as "no alerts needed".

global:
  resolve_timeout: 5m

route:
  receiver: slack-default
  group_by: ["alertname", "instance"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    # Pages go to PagerDuty AND Slack (continue: true falls through).
    - matchers:
        - severity = page
      receiver: pagerduty
      continue: true
    - matchers:
        - severity = page
      receiver: slack-default
    # The always-firing heartbeat goes only to the watchdog.
    - matchers:
        - severity = heartbeat
      receiver: deadmansswitch
      group_wait: 0s
      group_interval: 1m
      repeat_interval: 1m

receivers:
  - name: slack-default
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#cx-alerts"
        send_resolved: true
        title: "{{ .CommonLabels.alertname }} ({{ .CommonLabels.severity }})"
        text: >-
          {{ range .Alerts }}*{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          {{ end }}

  - name: pagerduty
    pagerduty_configs:
      - routing_key: "${PAGERDUTY_ROUTING_KEY}"
        send_resolved: true
        description: "{{ .CommonLabels.alertname }} on {{ .CommonLabels.instance }}"

  # The watchdog: a service (Dead Man's Snitch / healthchecks.io) that pages YOU
  # when the heartbeat stops arriving. Set DEADMANSSWITCH_URL to its ping URL.
  - name: deadmansswitch
    webhook_configs:
      - url: "${DEADMANSSWITCH_URL}"
        send_resolved: false
