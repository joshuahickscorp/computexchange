global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: staging
    service: computexchange

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

scrape_configs:
  - job_name: computexchange-control
    metrics_path: /metrics
    static_configs:
      - targets: [control:8080]

  - job_name: node-exporter
    static_configs:
      - targets: [node-exporter:9100]

  - job_name: alertmanager
    static_configs:
      - targets: [alertmanager:9093]
