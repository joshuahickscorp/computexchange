# Computexchange · Prometheus scrape config.
#
# Scrapes the two control-plane instances (control + control-2) on their
# in-network :8080/metrics, Caddy's own metrics (HTTP status codes, the only
# place 5xx is observable since the Go control plane exposes business metrics,
# not raw request counters), and the node/cadvisor exporters for host + per
# container resource pressure. Alertmanager is wired below; rules live in
# alerts.yml. All targets are reached over the compose network by service name,
# so nothing here is published to the public edge.
#
# BLACKHOLE: a scrape that fails surfaces as `up == 0`, which the InstanceDown
# rule in alerts.yml fires on. We never fabricate a healthy series.

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    cluster: computexchange-prod

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  # The control plane(s). Both instances expose the same cx_* exposition; we
  # label by instance so a per-instance WEDGED-TICKER fires on whichever pod's
  # ticker stalled. /metrics is unauthed (api.go exempts it from the limiter).
  - job_name: control
    metrics_path: /metrics
    static_configs:
      - targets:
          - control:8080
          - control-2:8080
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: "([^:]+):.*"
        replacement: "$1"

  # Caddy's Prometheus metrics (admin endpoint, in-network only). This is where
  # caddy_http_requests_total{code=...} comes from — the source of the
  # HighHTTP5xxRate alert, since the Go control plane does not export an HTTP
  # status counter. Enabled by `metrics` in the global Caddyfile options.
  - job_name: caddy
    metrics_path: /metrics
    static_configs:
      - targets:
          - caddy:2019

  # Host-level pressure (CPU, memory, disk, filesystem fill) for the droplet.
  - job_name: node
    static_configs:
      - targets:
          - node-exporter:9100

  # Per-container resource usage (the mem_limit/cpus caps in compose are only
  # useful if you can see a container pressing against them).
  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  # Blackbox TLS probe of the public edge — feeds the TLSCertExpiringSoon rule.
  # The exporter dials the real public hostnames so we measure the cert Caddy
  # actually served, not the one on disk.
  - job_name: blackbox-tls
    metrics_path: /probe
    params:
      module: [tls_connect]
    static_configs:
      - targets:
          - computexchange.net:443
          - storage.computexchange.net:443
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # Prometheus scrapes itself so the self-monitoring rules (config reload
  # failures, rule eval failures) have data.
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
