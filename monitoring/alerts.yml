# Computexchange · Prometheus alerting rules.
#
# Every rule keys on a metric that is ACTUALLY exposed (control plane cx_*,
# Caddy's caddy_http_*, blackbox probe_*, node/cadvisor). No rule depends on a
# series that does not exist — a missing series surfaces as the data-absent
# rules below (DeadMansSwitch / *NoData), never as a silently-never-firing
# alert. BLACKHOLE: we would rather page on "I cannot see the metric" than
# pretend green.
#
# Severities: `page` → wakes a human (Alertmanager routes to the paging
# receiver); `ticket` → notification only.

groups:
  # ── Liveness / scrape health ───────────────────────────────────────────────
  - name: liveness
    rules:
      - alert: InstanceDown
        expr: up == 0
        for: 2m
        labels:
          severity: page
        annotations:
          summary: "Scrape target {{ $labels.job }}/{{ $labels.instance }} is down"
          description: >
            Prometheus has been unable to scrape {{ $labels.instance }}
            ({{ $labels.job }}) for 2 minutes. For the control job this means a
            control-plane instance is unreachable; with two instances the other
            still serves traffic behind Caddy, but capacity/redundancy is lost.

      # A dead-man's switch: this rule is ALWAYS firing. Alertmanager is
      # configured to alert if it ever STOPS arriving (the heartbeat receiver),
      # which is how we detect Prometheus/Alertmanager itself being dead — the
      # one failure the rest of the rules cannot catch.
      - alert: DeadMansSwitch
        expr: vector(1)
        labels:
          severity: heartbeat
        annotations:
          summary: "Monitoring heartbeat (always firing — alert if it STOPS)"
          description: >
            If this alert is NOT present in Alertmanager, the monitoring
            pipeline itself is down. Wire the heartbeat receiver to a watchdog
            (e.g. Dead Man's Snitch / healthchecks.io).

  # ── WEDGED TICKER (the headline ops alert) ─────────────────────────────────
  # Keyed on cx_ticker_seconds_since_success, the gauge the control agent adds:
  # seconds since the background worker loop (payout release / stale-task
  # requeue / webhook sweep) last completed a full successful cycle. If it grows
  # without bound the ticker is wedged — payouts stop settling and stale tasks
  # stop being requeued — even while /healthz and HTTP stay green. This is the
  # single most important "looks alive but isn't" signal.
  - name: wedged-ticker
    rules:
      - alert: WedgedTicker
        # 300s == 5min. The fastest sweep (stale-requeue) runs well under a
        # minute; payout/webhook on the order of a minute. 5min with no
        # successful cycle anywhere is unambiguously wedged, not just slow.
        expr: max by (instance) (cx_ticker_seconds_since_success) > 300
        for: 1m
        labels:
          severity: page
        annotations:
          summary: "Control-plane ticker wedged on {{ $labels.instance }}"
          description: >
            cx_ticker_seconds_since_success on {{ $labels.instance }} is
            {{ $value | humanizeDuration }} — the background worker loop has not
            completed a successful cycle. Payouts are not settling and stale
            tasks are not being requeued. Runbook: docs/RUNBOOKS.md §"Wedged
            ticker". Likely a stuck DB query or a panicked goroutine; restart the
            affected control instance to recover, then investigate logs.

      # The metric vanishing entirely (control agent not emitting it, or scrape
      # broken) is itself a wedge we must not miss.
      - alert: WedgedTickerNoData
        expr: absent(cx_ticker_seconds_since_success)
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "cx_ticker_seconds_since_success metric is absent"
          description: >
            No instance is exporting cx_ticker_seconds_since_success. Either both
            control instances are down, the metric was removed, or scraping is
            broken. Treat as a wedged ticker until proven otherwise.

  # ── Payouts ────────────────────────────────────────────────────────────────
  - name: payouts
    rules:
      # Credits are reaching 'ready' (owed) but the release rate is flat — money
      # owed to suppliers is not moving. We compare the deferral signal (payouts
      # that fell back to 'ready') against actual releases. A sustained gap with
      # zero releases while work is completing means the Stripe rail is failing
      # every cycle (BLACKHOLE: releasePayouts never fakes 'released').
      - alert: PayoutsNotReleasing
        expr: >
          rate(cx_tasks_completed_total[1h]) > 0
          and rate(cx_payouts_released_total[1h]) == 0
        for: 2h
        labels:
          severity: page
        annotations:
          summary: "Work is completing but no payouts are releasing"
          description: >
            Tasks have been completing for 2h but cx_payouts_released_total has
            not moved. Either no payout rail is configured (expected in alpha —
            credits sit 'owed'), or the configured Stripe rail is rejecting every
            transfer. Check `GET /admin/payouts` and control-plane logs for
            "payout … deferred". Runbook: docs/RUNBOOKS.md §3.

  # ── Database connection pool exhaustion ────────────────────────────────────
  # The Go control plane does not export pool gauges directly, so we infer
  # exhaustion two ways and fire on either. (1) cadvisor: the postgres container
  # at its connection ceiling shows up as a flat-out CPU/mem container; (2) the
  # primary signal — the ticker wedges (above) because every sweep query blocks
  # waiting for a free connection. We ALSO surface a direct rule keyed on the
  # postgres_exporter series if that exporter is added later; until then this is
  # the honest proxy and is documented as such in RUNBOOKS.
  - name: database
    rules:
      - alert: PostgresConnectionsNearLimit
        # pg_settings_max_connections and pg_stat_activity_count come from
        # postgres_exporter. If the exporter is not deployed these series are
        # absent and PostgresExporterAbsent fires instead — never a false green.
        expr: >
          sum(pg_stat_activity_count) by (instance)
          / on (instance) pg_settings_max_connections > 0.85
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "Postgres connection pool >85% utilised"
          description: >
            {{ $value | humanizePercentage }} of max_connections are in use on
            {{ $labels.instance }}. With two control instances each holding a
            pool (DB_MAX_CONNS), pool exhaustion blocks every query and wedges
            the ticker. Lower DB_MAX_CONNS per instance or raise Postgres
            max_connections. Runbook: docs/RUNBOOKS.md §"DB pool exhaustion".

      - alert: PostgresExporterAbsent
        expr: absent(pg_settings_max_connections)
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: "postgres_exporter metrics absent — DB pool blind spot"
          description: >
            pg_settings_max_connections is not being scraped, so the
            PostgresConnectionsNearLimit rule cannot evaluate. Deploy
            postgres_exporter (see monitoring/README) or accept that DB pool
            exhaustion will only be caught indirectly via WedgedTicker.

  # ── HTTP 5xx (observed at the Caddy edge) ──────────────────────────────────
  - name: http
    rules:
      - alert: HighHTTP5xxRate
        # caddy_http_requests_total is labelled by handler + code. We ratio 5xx
        # against all responses over 5m. Fires above 5% sustained.
        expr: >
          sum(rate(caddy_http_requests_total{code=~"5.."}[5m]))
          / sum(rate(caddy_http_requests_total[5m])) > 0.05
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "Edge 5xx rate above 5%"
          description: >
            {{ $value | humanizePercentage }} of responses at the Caddy edge are
            5xx over the last 5m. Check both control instances' /healthz and
            logs; if one instance is bad, Caddy should already be routing around
            it (health-checked upstream) — a sustained rate means both are
            affected or the dependency (Postgres/MinIO) is down.

      - alert: CaddyMetricsAbsent
        expr: absent(caddy_http_requests_total)
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: "Caddy metrics absent — 5xx blind spot"
          description: >
            caddy_http_requests_total is not being scraped (is `metrics` enabled
            in the Caddyfile global options and the admin endpoint reachable at
            caddy:2019?). HighHTTP5xxRate cannot evaluate without it.

  # ── TLS certificate expiry ─────────────────────────────────────────────────
  - name: tls
    rules:
      - alert: TLSCertExpiringSoon
        # blackbox tls_connect exposes probe_ssl_earliest_cert_expiry as a unix
        # ts. Caddy auto-renews ~30d out; if we are inside 14d renewal has been
        # failing and needs a human.
        expr: probe_ssl_earliest_cert_expiry - time() < 14 * 24 * 3600
        for: 1h
        labels:
          severity: page
        annotations:
          summary: "TLS cert for {{ $labels.instance }} expires in <14d"
          description: >
            The certificate served for {{ $labels.instance }} expires in
            {{ $value | humanizeDuration }}. Caddy renews automatically at ~30d;
            being inside 14d means ACME renewal is failing (rate limit, DNS, or
            port 80/443 blocked). Runbook: docs/RUNBOOKS.md §"Cert renewal".

      - alert: TLSProbeFailing
        expr: probe_success{job="blackbox-tls"} == 0
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "TLS probe to {{ $labels.instance }} failing"
          description: >
            The blackbox TLS handshake to {{ $labels.instance }} is failing —
            the public edge may be down or serving a broken cert.

  # ── Host / container resource pressure ─────────────────────────────────────
  - name: resources
    rules:
      - alert: HostDiskFillingUp
        # WAL archiving + pgdata + miniodata live on the droplet disk; a full
        # disk halts Postgres writes. Page at <10% free on the data filesystem.
        expr: >
          node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"}
          / node_filesystem_size_bytes{mountpoint="/",fstype!="tmpfs"} < 0.10
        for: 10m
        labels:
          severity: page
        annotations:
          summary: "Root filesystem <10% free on {{ $labels.instance }}"
          description: >
            {{ $value | humanizePercentage }} free on /. Postgres halts writes on
            a full disk. Check WAL archive backlog (is offsite shipping working?)
            and prune old local backups.

      - alert: HostMemoryPressure
        expr: >
          node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes < 0.10
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: "Host memory <10% available on {{ $labels.instance }}"
          description: >
            The droplet is under memory pressure. The per-container mem_limit
            caps protect against one service OOMing the box, but sustained
            pressure risks OOM-kills. Consider a larger droplet.

      - alert: ContainerRestartLoop
        expr: rate(container_start_time_seconds[15m]) > 0 and increase(container_start_time_seconds[1h]) >= 3
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "Container {{ $labels.name }} is restart-looping"
          description: >
            {{ $labels.name }} has restarted >=3 times in the last hour. Check
            `docker compose logs {{ $labels.name }}`.

  # ── Performance leading indicators (Performance Observability 7->8) ────────
  # cx_watchdog_near_miss_total and cx_queue_depth were both named in the audit
  # as exposed-but-unalerted: "queue depth and the watchdog near-miss counter
  # both have no rule and no dashboard panel." Both are LEADING indicators — a
  # rising near-miss rate or a climbing, non-draining queue shows up well before
  # a customer notices a job is slow, which is the whole point of catching a
  # regression "the same day" rather than by complaint.
  - name: performance-leading-indicators
    rules:
      # A rising rate of jobs finishing >1.2x their predicted ETA (see
      # recordEtaCalibration/workers.go) is exactly the leading signal a fresh
      # inference/dispatch regression produces before it is obvious anywhere
      # else — the counter is cumulative and job-volume-dependent, so this
      # alerts on its RATE (near-misses/sec, over 30m) rather than an absolute
      # count, which stays meaningful whether the fleet is doing 10 jobs/hour or
      # 10,000. Threshold is deliberately a low bar (>0 sustained) because a
      # healthy fleet's near-miss rate should be close to zero most of the time
      # — the ETA calibration loop exists precisely so predictions track
      # reality; a sustained non-zero rate means something is actively
      # underestimating durations right now.
      - alert: WatchdogNearMissRateElevated
        expr: rate(cx_watchdog_near_miss_total[30m]) > 0
        for: 15m
        labels:
          severity: ticket
        annotations:
          summary: "Jobs are finishing late more than expected"
          description: >
            cx_watchdog_near_miss_total has been increasing for 15m+
            ({{ $value | humanize }}/s over the last 30m) — jobs are completing
            more than 1.2x their predicted ETA. This is the leading indicator
            for an inference or dispatch regression: check GET /admin/drift
            for the (job_type, model) slice whose observed p90 has moved in the
            last 24h, and cx_task_duration_ms for the same window. Runbook:
            docs/RUNBOOKS.md.

      - alert: WatchdogNearMissMetricAbsent
        expr: absent(cx_watchdog_near_miss_total)
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: "cx_watchdog_near_miss_total metric is absent"
          description: >
            No instance is exporting cx_watchdog_near_miss_total. Either both
            control instances are down (InstanceDown should also be firing) or
            the metric was removed — WatchdogNearMissRateElevated cannot
            evaluate without it.

      # Queue depth climbing and staying up means dispatch is not keeping pace
      # with arrivals — could be a supply shortage (no eligible workers) or a
      # dispatch-side regression (claim query slow, workers stuck). Summed
      # across tier/job_type so a single hot job_type cannot hide inside an
      # average; a sustained high total for 10m is a real backlog, not a
      # momentary burst absorbed by normal claim latency.
      - alert: QueueDepthSustainedHigh
        expr: sum(cx_queue_depth) > 200
        for: 10m
        labels:
          severity: page
        annotations:
          summary: "Claimable task queue depth sustained above 200"
          description: >
            {{ $value | humanize }} claimable tasks have been queued for 10m+
            across all tiers/job_types. Either the supplier fleet is
            undersized for current demand (check GET /admin/summary active
            worker count) or dispatch itself has regressed (check
            cx_claim_duration_ms and the stuck-run watchdog counters). A
            growing, non-draining queue is a leading indicator of buyer-visible
            ETA breaches before any single job looks individually stuck.

      - alert: QueueDepthMetricAbsent
        expr: absent(cx_queue_depth)
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: "cx_queue_depth metric is absent"
          description: >
            No instance is exporting cx_queue_depth (or the backing DB query is
            failing — check control-plane logs for "cx_queue_depth
            unavailable"). QueueDepthSustainedHigh cannot evaluate without it.

  # ─────────────────────────────────────────────────────────────────────────
  # Bundle D+E+F (Data Transfer 9->10, End-to-End Latency 8->8.5/8.5->9). Kept
  # as its OWN rule group, separate from performance-leading-indicators above,
  # so these can be tuned/silenced independently of the near-miss/queue-depth
  # rules. Every alert keys on a real exported metric and carries the paired
  # _absent twin the file's convention requires (a vanished series must page,
  # never silently read green).
  # ─────────────────────────────────────────────────────────────────────────
  - name: latency-escapes-and-transfer
    rules:
      # The class-aware no-peer watchdog (latency_watchdog.go) requeues a task
      # wedged on a heartbeating worker that has NO eligible same-class peer —
      # the one path a 1s inference could otherwise take 30+ minutes. A single
      # requeue is a handled event, not an incident; a SUSTAINED rate is the
      # leading indicator that the fleet is too THIN or too HETEROGENEOUS for
      # some job class (no independent same-class peer ever online to hedge to),
      # the structural condition this watchdog only papers over. Rate over 30m
      # (not an absolute count) so it stays meaningful at any fleet size.
      - alert: NoPeerRequeuesSustained
        expr: rate(cx_no_peer_requeues_total[30m]) > 0
        for: 20m
        labels:
          severity: ticket
        annotations:
          summary: "Tasks repeatedly wedged with no eligible same-class peer"
          description: >
            cx_no_peer_requeues_total has been climbing for 20m+
            ({{ $value | humanize }}/s over the last 30m). The no-peer watchdog
            is repeatedly rescuing tasks held by a heartbeating worker with no
            independent same-class peer online — hedging cannot help these, so
            they would otherwise wait out the 30-minute stale reaper. This is a
            supply-shape problem, not a transient: some (hw_class, engine,
            build_hash) class has too few distinct-supplier workers to ever
            cross-check or hedge itself. Check GET /admin/summary for the online
            worker mix. Runbook: docs/RUNBOOKS.md.

      - alert: NoPeerRequeuesMetricAbsent
        expr: absent(cx_no_peer_requeues_total)
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: "cx_no_peer_requeues_total metric is absent"
          description: >
            No instance is exporting cx_no_peer_requeues_total. Either both
            control instances are down (InstanceDown should also be firing) or
            the metric was removed — NoPeerRequeuesSustained cannot evaluate
            without it.

      # Control-side object-store transfer latency (storage.go PutObject/
      # GetObject, cx_transfer_duration_ms). A rising p90 on the GET path is the
      # leading signal that the byte path — the buyer's result fetch and the
      # verifier's peer-result GET both go through it — has slowed, before it
      # shows up as a buyer-visible ETA breach. histogram_quantile over a 30m
      # window; 2s is a generous bar for an in-region object a healthy MinIO/S3
      # returns in tens of ms, so a sustained breach is a real store/network
      # regression, not jitter.
      - alert: TransferLatencyP90High
        expr: histogram_quantile(0.9, sum by (le) (rate(cx_transfer_duration_ms_bucket{direction="get"}[30m]))) > 2000
        for: 15m
        labels:
          severity: ticket
        annotations:
          summary: "Object-store GET p90 latency sustained above 2s"
          description: >
            The p90 of cx_transfer_duration_ms{direction="get"} has been above
            2000ms for 15m+ ({{ $value | humanize }}ms). Every result fetch and
            every verifier peer-result GET flows through this path, so a
            sustained rise here precedes buyer-visible slowness. Check the
            object store's own health (MinIO/S3 latency, the control plane's
            storeBreaker state in the logs) and cx_transfer_bytes to rule out a
            genuine large-object shift vs a store slowdown. Runbook:
            docs/RUNBOOKS.md.

      - alert: TransferDurationMetricAbsent
        expr: absent(cx_transfer_duration_ms_count)
        for: 30m
        labels:
          severity: ticket
        annotations:
          summary: "cx_transfer_duration_ms metric is absent"
          description: >
            No instance is exporting cx_transfer_duration_ms. A healthy control
            plane transfers objects continuously (every job submit, result
            fetch, and merge), so a 30m absence means either both instances are
            down (InstanceDown should also fire) or the metric was removed —
            TransferLatencyP90High cannot evaluate without it.

      # Heterogeneous-fleet silent degradation, seen at DISPATCH TIME (Scheduling
      # & Matching Engine 7->8, docs/internal/CREED_AND_PATH_TO_TEN.md "Make
      # heterogeneous-fleet degradation visible instead of silent"). Distinct from
      # NoPeerRequeuesSustained above: THAT fires when the latency watchdog RESCUES
      # a task already wedged 5+ minutes; cx_no_hedge_peer_total ticks the moment a
      # redundancy/hedge/tiebreak peer is SOUGHT (SelectRedundancyPeerExcluding) and
      # no independent SAME-class peer exists though the fleet HAS live eligible
      # supply of another class — the immediate signal that redundancy/warm-routing/
      # tiebreak just silently degraded on a thin mixed fleet. A single event is
      # normal churn; a sustained rate is the leading indicator that some
      # (hw_class, engine, build_hash) class is too thin to ever cross-check itself.
      # Rate over 30m (not an absolute count) so it stays meaningful at any scale.
      - alert: NoHedgePeerSustained
        expr: rate(cx_no_hedge_peer_total[30m]) > 0
        for: 20m
        labels:
          severity: ticket
        annotations:
          summary: "Hedge/tiebreak peer searches repeatedly finding no same-class peer"
          description: >
            cx_no_hedge_peer_total has been climbing for 20m+
            ({{ $value | humanize }}/s over the last 30m). A redundancy, hedge, or
            tiebreak dispatch is repeatedly finding NO independent same-class peer
            even though the fleet has live eligible supply of another class — so
            those verifications and warm-routing bonuses are silently degrading on
            a heterogeneous fleet. This is a supply-shape problem: a
            (hw_class, engine, build_hash) class has too few distinct-supplier
            workers to cross-check itself. Check GET /admin/summary for the online
            worker mix. Runbook: docs/RUNBOOKS.md.

      - alert: NoHedgePeerMetricAbsent
        expr: absent(cx_no_hedge_peer_total)
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: "cx_no_hedge_peer_total metric is absent"
          description: >
            No instance is exporting cx_no_hedge_peer_total. Either both control
            instances are down (InstanceDown should also be firing) or the metric
            was removed — NoHedgePeerSustained cannot evaluate without it.

  # ─────────────────────────────────────────────────────────────────────────
  # Postgres Data Lifecycle 6->7 (docs/internal/CREED_AND_PATH_TO_TEN.md) — the
  # partition-rotation ticker's health, kept in its OWN group. Rotation
  # (control/workers.go rotateTelemetryPartitions → Store.RotateTelemetryPartitions)
  # CREATEs upcoming month partitions and DROPs expired ones for the three
  # partitioned telemetry tables. Unlike the payout/webhook sweeps, a wedged
  # rotation ticker is SILENT: /healthz and HTTP stay green, but new rows quietly
  # fall into the DEFAULT partition (which no drop-expired can ever reclaim) and
  # retention silently reverts to the very unbounded-growth this facet exists to
  # prevent — a slow-motion disk-fill, not an immediate outage. That is exactly the
  # "lifecycle failure a human should hear about before it becomes an incident"
  # class, so it gets its own rule rather than hiding inside the generic
  # WedgedTicker aggregate. Both rules key on the per-ticker series the liveness
  # guard already exports (cx_ticker_seconds_since_success / cx_ticker_failures_total,
  # labelled ticker="partition-rotation"), so nothing new needs instrumenting.
  - name: partition-lifecycle
    rules:
      # The rotation ticker runs every 6h (partitionRotationInterval). A full day
      # (86400s) with no successful run means ~4 missed cycles — unambiguously
      # wedged, not merely slow, while still well ahead of any real create-ahead
      # exhaustion (the migration/rotation keeps 2 months of partitions created in
      # advance, so a day of downtime cannot yet route a live insert into DEFAULT).
      - alert: PartitionRotationWedged
        expr: max by (instance) (cx_ticker_seconds_since_success{ticker="partition-rotation"}) > 86400
        for: 10m
        labels:
          severity: page
        annotations:
          summary: "Telemetry partition-rotation ticker wedged on {{ $labels.instance }}"
          description: >
            The partition-rotation ticker on {{ $labels.instance }} has not
            completed a successful run for {{ $value | humanizeDuration }}. It is
            not creating upcoming month partitions or dropping expired ones, so
            telemetry retention has silently reverted to unbounded growth — new
            worker_memory_samples / task_durations / job_events rows will start
            landing in each table's DEFAULT partition (which drop-expired cannot
            reclaim) and disk will fill over days. This is silent: /healthz stays
            green. Restart the affected control instance to recover, then confirm
            "partition-rotation" is running in the logs. Runbook: docs/RUNBOOKS.md.

      # A rotation that FAILS every run gets rescheduled just inside its stale
      # budget and would never trip the wedge rule above, so alert on a sustained
      # non-zero failure RATE too (same pairing the near-miss/queue rules use). A
      # single transient DB error is normal churn; a rate sustained for 30m means
      # every rotation attempt is erroring (a bad DROP, a lock, a permissions
      # regression) and retention is not advancing.
      - alert: PartitionRotationFailing
        expr: rate(cx_ticker_failures_total{ticker="partition-rotation"}[30m]) > 0
        for: 30m
        labels:
          severity: page
        annotations:
          summary: "Telemetry partition-rotation is failing every run on {{ $labels.instance }}"
          description: >
            cx_ticker_failures_total{ticker="partition-rotation"} on
            {{ $labels.instance }} has been climbing for 30m+
            ({{ $value | humanize }}/s over the last 30m) — every rotation attempt
            is returning an error, so upcoming partitions are not being created and
            expired ones are not being dropped. Check control-plane logs for
            "partition-rotation" errors (a failed DROP TABLE, an advisory-lock
            contention, or a schema drift). Runbook: docs/RUNBOOKS.md.

      # The per-ticker series vanishing entirely (control not emitting it, scrape
      # broken, or the ticker never registered) is itself a lifecycle blind spot we
      # must not miss — the file's convention: a vanished series pages, never reads
      # green. Absent for 30m (longer than the two 10m twins) because this ticker is
      # deliberately slow-cadence, so a short scrape gap is not yet meaningful.
      - alert: PartitionRotationMetricAbsent
        expr: absent(cx_ticker_seconds_since_success{ticker="partition-rotation"})
        for: 30m
        labels:
          severity: ticket
        annotations:
          summary: "partition-rotation ticker metric is absent"
          description: >
            No instance is exporting
            cx_ticker_seconds_since_success{ticker="partition-rotation"}. Either
            both control instances are down (InstanceDown should also fire), the
            ticker was never registered, or scraping is broken —
            PartitionRotationWedged cannot evaluate without it. Treat telemetry
            retention as unverified until resolved.
