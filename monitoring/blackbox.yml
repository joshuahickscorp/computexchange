# Computexchange · blackbox_exporter modules.
#
# tls_connect performs a TLS handshake against the target and exposes
# probe_ssl_earliest_cert_expiry / probe_success — the inputs to the
# TLSCertExpiringSoon and TLSProbeFailing rules.

modules:
  tls_connect:
    prober: tcp
    timeout: 10s
    tcp:
      tls: true
      tls_config:
        # We verify the served chain so an expired/invalid cert fails the probe
        # (probe_success == 0), which is exactly the signal we want.
        insecure_skip_verify: false
