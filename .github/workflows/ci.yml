name: ci

on:
  push:
    branches: [main, reconstruct/event-horizon]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  control:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: cx
          POSTGRES_PASSWORD: cx
          POSTGRES_DB: cx
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U cx -d cx"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://cx:cx@localhost:5432/cx?sslmode=disable
      PGPASSWORD: cx
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26.5"
          cache-dependency-path: control/go.sum
      - name: schema is idempotent
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          psql -h localhost -U cx -d cx -v ON_ERROR_STOP=1 --single-transaction -f control/schema.sql
          psql -h localhost -U cx -d cx -v ON_ERROR_STOP=1 --single-transaction -f control/schema.sql
      - name: format, vet, test, race
        run: |
          test -z "$(gofmt -l control)"
          cd control
          go vet ./...
          go test ./...
          go test -race ./...
      - name: build and census
        run: |
          cd control
          time go build -trimpath -o "$RUNNER_TEMP/cx" .
          go run . audit codebase --out census

  agent:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable 2026-07-19
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: agent
      - name: format, lint, test
        run: |
          cd agent
          cargo fmt --all -- --check
          cargo clippy --all-targets -- -D warnings
          cargo test
      - name: release build and sandbox
        run: |
          cd agent
          time cargo build --release
          cd ..
          bash macapp/ComputeExchangeAgent/sandbox-profile-test.sh

  interfaces:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: schema and generated artifacts
        run: |
          python3 -m json.tool proto/manifest.schema.json >/dev/null
          python3 -m json.tool control/runtime-authority.json >/dev/null
          node scripts/site-build.mjs
      - name: Python SDK package
        run: bash scripts/verify-python-sdk-package.sh
      - name: CLI release archive
        run: bash scripts/verify-cli-release.sh v0.1.0-rc.1

  container:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26.5"
      - name: Build immutable candidate image
        run: |
          docker build \
            --build-arg CX_BUILD_VERSION=v0.1.0-rc.1 \
            --build-arg CX_BUILD_COMMIT="$GITHUB_SHA" \
            --build-arg CX_BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --tag "computexchange/control:$GITHUB_SHA" \
            --file Dockerfile.control .
          docker image inspect "computexchange/control:$GITHUB_SHA" \
            --format '{{.Id}}' | tee container-image-id.txt
      - name: Generate image SBOM
        run: |
          go run github.com/anchore/syft/cmd/syft@v1.48.0 \
            "computexchange/control:$GITHUB_SHA" \
            --output spdx-json=sbom.spdx.json
          test -s sbom.spdx.json
      - name: Upload candidate supply-chain evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: candidate-supply-chain-${{ github.sha }}
          path: |
            container-image-id.txt
            sbom.spdx.json
          if-no-files-found: error
          retention-days: 30

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26.5"
          cache-dependency-path: control/go.sum
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable 2026-07-19
      - name: Go call-graph vulnerability scan
        working-directory: control
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...
      - name: Candidate secret scan
        run: go run github.com/zricethezav/gitleaks/v8@v8.30.1 dir --redact --no-banner .
      - name: RustSec advisory scan
        working-directory: agent
        run: |
          cargo install --locked cargo-audit --version 0.22.2
          cargo audit
