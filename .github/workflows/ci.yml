name: ci

on:
  push:
    branches: [main, reconstruct/event-horizon]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  control:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: cx
          POSTGRES_PASSWORD: cx
          POSTGRES_DB: cx
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U cx -d cx"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://cx:cx@localhost:5432/cx?sslmode=disable
      PGPASSWORD: cx
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache-dependency-path: control/go.sum
      - name: schema is idempotent
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          psql -h localhost -U cx -d cx -v ON_ERROR_STOP=1 --single-transaction -f control/schema.sql
          psql -h localhost -U cx -d cx -v ON_ERROR_STOP=1 --single-transaction -f control/schema.sql
      - name: format, vet, test, race
        run: |
          test -z "$(gofmt -l control)"
          cd control
          go vet ./...
          go test ./...
          go test -race ./...
      - name: build and census
        run: |
          cd control
          time go build -trimpath -o "$RUNNER_TEMP/cx" .
          go run . audit codebase --out census

  agent:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent
      - name: format, lint, test
        run: |
          cd agent
          cargo fmt --all -- --check
          cargo clippy --all-targets -- -D warnings
          cargo test
      - name: release build and sandbox
        run: |
          cd agent
          time cargo build --release
          cd ..
          bash macapp/ComputeExchangeAgent/sandbox-profile-test.sh

  interfaces:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: schema and generated artifacts
        run: |
          python3 -m json.tool proto/manifest.schema.json >/dev/null
          python3 -m json.tool control/runtime-authority.json >/dev/null
          node scripts/site-build.mjs
      - name: Python SDK package
        run: bash scripts/verify-python-sdk-package.sh
