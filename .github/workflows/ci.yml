# Computexchange — CI. Three independent jobs, each a real gate that fails
# loudly (no `|| true`, no soft-skip): the Go control plane (build + vet + gofmt
# + tests against live Postgres & MinIO), the Rust agent (fmt + clippy + build +
# the non-ignored test set, on macOS for Candle/Metal), and a schema apply that
# asserts db/schema.sql loads cleanly into Postgres 17.

name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Control plane (Go) ───────────────────────────────────────────────────────
  control:
    name: control (go)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: cx
          POSTGRES_PASSWORD: cx
          POSTGRES_DB: cx
        ports:
          - 5432:5432
        # Gate the job on the DB actually accepting connections.
        options: >-
          --health-cmd "pg_isready -U cx -d cx"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://cx:cx@localhost:5432/cx?sslmode=disable
      S3_ENDPOINT: http://localhost:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_BUCKET: cx-jobs
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: control/go.sum
      - name: install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: start MinIO (bitnami image was retired; run the official one as a step)
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data
          for i in $(seq 1 30); do
            curl -fsS http://localhost:9000/minio/health/live >/dev/null 2>&1 && { echo "minio up"; break; }
            sleep 2
          done
          docker run --rm --network host -e MC_HOST_local=http://minioadmin:minioadmin@localhost:9000 \
            minio/mc mb -p local/cx-jobs
      - name: apply schema (base tables for the integration suite)
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f db/schema.sql
      - name: build
        run: cd control && go build ./...
      - name: vet
        run: cd control && go vet ./...
      - name: gofmt (must be clean)
        run: |
          cd control
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$unformatted"
            exit 1
          fi
      - name: test (unit, no infra)
        run: cd control && go test ./...
      - name: test (integration matrix — live Postgres + MinIO)
        run: cd control && go test -tags integration -count=1 ./...

  # ── Supplier agent (Rust) ────────────────────────────────────────────────────
  # macOS so Candle's default `metal` feature compiles (Metal is unavailable on
  # Linux runners). cargo test runs the non-ignored set; the three model-download
  # integration tests are #[ignore]d and not exercised here.
  agent:
    name: agent (rust)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent
      - name: fmt (check)
        run: cd agent && cargo fmt --check
      - name: clippy (deny warnings)
        run: cd agent && cargo clippy -- -D warnings
      - name: build
        run: cd agent && cargo build
      - name: test (non-ignored)
        run: cd agent && cargo test

  # ── Supplier agent — CUDA lane (Linux) ───────────────────────────────────────
  # Compile-gate the NVIDIA/CUDA build so the lane can't silently rot. Installs the
  # CUDA toolkit (no GPU needed to COMPILE + link Candle's CUDA kernels) and builds
  # with --features cuda, mirroring the RunPod build (docs/RUNPOD_SPIKE.md). It does
  # NOT run — CI has no NVIDIA GPU; runtime is verified on a real GPU host (prove-cuda).
  # The CUDA toolkit version may need bumping as Candle/cudarc move.
  agent-cuda:
    name: agent (cuda build)
    runs-on: ubuntu-latest
    # Informational, non-blocking: the CUDA lane's authoritative gate is a build on
    # real NVIDIA hardware (docs/RUNPOD_SPIKE.md + the A100 trial). CUDA-in-CI
    # containers are finicky, so a hiccup here must not block merges to main.
    continue-on-error: true
    # Run IN the CUDA devel image — it ships nvcc + the dev libs Candle needs to
    # COMPILE the NVIDIA lane (no GPU required to build, no flaky toolkit-install
    # action). Mirrors Dockerfile.agent's build stage. Runtime is proven on real
    # NVIDIA hardware (docs/RUNPOD_SPIKE.md + the A100 trial), not here.
    container: nvidia/cuda:12.4.1-devel-ubuntu22.04
    steps:
      - uses: actions/checkout@v4
      - name: install build deps + rust
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq
          apt-get install -y -qq curl build-essential pkg-config libssl-dev ca-certificates
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
      - name: build (cuda feature)
        env:
          # candle-kernels probes nvidia-smi for the GPU compute capability at BUILD
          # time, but no GPU is present during a container build (only at docker run
          # --gpus all). Pin it so the kernels compile headless (sm_80 = A100, the
          # trial target); other archs JIT from PTX at runtime. Without this the build
          # fails at ComputeCapDetectionFailed before our code is ever compiled.
          CUDA_COMPUTE_CAP: "80"
        run: |
          . "$HOME/.cargo/env"
          cd agent && cargo build --no-default-features --features cuda

  # ── Schema apply ─────────────────────────────────────────────────────────────
  # Assert the single authoritative schema loads into Postgres 17 with no error.
  # ON_ERROR_STOP=1 turns any SQL error into a non-zero psql exit, failing the job.
  schema:
    name: schema (psql apply)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: cx
          POSTGRES_PASSWORD: cx
          POSTGRES_DB: cx
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cx -d cx"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: apply schema (idempotent — apply twice to prove re-runnability)
        env:
          PGPASSWORD: cx
        run: |
          psql -h localhost -U cx -d cx -v ON_ERROR_STOP=1 -f db/schema.sql
          psql -h localhost -U cx -d cx -v ON_ERROR_STOP=1 -f db/schema.sql
